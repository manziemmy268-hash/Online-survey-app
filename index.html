<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SurveyPay Rwanda | Share Your Voice, Earn Rewards</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="Join SurveyPay Rwanda, the premier platform for paid surveys in Rwanda. Earn RWF by sharing your thoughts on technology, society, and consumer trends.">
    <meta name="keywords" content="Rwanda, surveys, earn money, paid surveys, Kigali, MTN MoMo, Airtel Money">
    <meta name="theme-color" content="#2563eb">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Video Animation -->
    <div class="video-background">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="https://videos.pexels.com/video-files/6693625/6693625-hd_1280_720_25fps.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <div id="app">
        <!-- Main Application Container -->
        <div class="initial-loader">
            <div class="spinner"></div>
            <p style="font-family: 'Outfit', sans-serif; font-weight: 600; color: #1e293b;">Initializing SurveyPay Rwanda...</p>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
